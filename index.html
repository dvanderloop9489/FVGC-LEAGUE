<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#166534">
    <title>FVGC 2026 League Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Playfair Display', serif; }
        .golf-green { background: linear-gradient(135deg, #166534 0%, #052e16 100%); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.2); }
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.92) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .rank-badge { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

    <!-- HEADER with your logo -->
    <div class="golf-green sticky top-0 z-50 shadow-2xl">
        <div class="max-w-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <!-- Your logo here -->
                <img src="https://i.imgur.com/YourLogoURL.png" alt="Keep Golf Real The Fox" class="h-16 w-16 rounded-full shadow-lg border-4 border-white/30">
                <div>
                    <h1 class="title-font text-4xl font-bold tracking-tight">FVGC 2026</h1>
                </div>
            </div>
            <div class="flex bg-white/10 backdrop-blur-md rounded-3xl p-1">
                <button onclick="showTab(0)" id="tab-0" class="tab-button active px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-x-2">🏆 Standings</button>
                <button onclick="showTab(1)" id="tab-1" class="tab-button px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-x-2">📝 Enter Round</button>
                <button onclick="showTab(2)" id="tab-2" class="tab-button px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-x-2">📜 History</button>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-6 pt-8">

        <!-- STANDINGS TAB -->
        <div id="content-0" class="tab-content">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-4xl font-semibold title-font tracking-tight">League Standings</h2>
                <div onclick="exportData()" class="text-emerald-400 hover:text-emerald-300 cursor-pointer text-sm flex items-center gap-x-1">💾 Export</div>
            </div>
            <div id="standings-table" class="bg-zinc-900/70 backdrop-blur-xl rounded-3xl overflow-hidden border border-white/10"></div>
        </div>

        <!-- ENTER SCORES TAB -->
        <div id="content-1" class="tab-content hidden">
            <h2 class="text-4xl font-semibold title-font tracking-tight mb-8">Enter New Round</h2>
            <div class="bg-zinc-900/70 backdrop-blur-xl rounded-3xl p-8 border border-white/10">
                <div class="space-y-8">
                    <div>
                        <label class="block text-emerald-200 text-sm mb-2 font-medium">ROUND / TOURNAMENT NAME</label>
                        <input id="tournament-name" class="w-full bg-zinc-800 border border-white/20 focus:border-emerald-400 rounded-2xl px-6 py-5 text-lg outline-none" placeholder="Week 1 - April 11">
                    </div>

                    <div>
                        <label class="block text-emerald-200 text-sm mb-4 font-medium">PLAYERS WHO PARTICIPATED</label>
                        <div id="player-selection" class="grid grid-cols-1 gap-3"></div>
                    </div>

                    <div>
                        <label class="block text-emerald-200 text-sm mb-4 font-medium">SCORES &amp; WINNINGS</label>
                        <div id="score-inputs" class="space-y-4"></div>
                    </div>

                    <button onclick="saveNewTournament()" 
                            class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 py-6 rounded-3xl text-xl font-semibold shadow-xl active:scale-95 transition-all">
                        💾 Save & Sync Round
                    </button>
                </div>
            </div>
        </div>

        <!-- HISTORY TAB -->
        <div id="content-2" class="tab-content hidden">
            <h2 class="text-4xl font-semibold title-font tracking-tight mb-8">Tournament History</h2>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- PLAYER DETAIL MODAL -->
    <div id="player-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full max-w-2xl mx-4 lg:mx-auto rounded-t-3xl lg:rounded-3xl p-8 modal border border-white/10">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-player-name" class="text-3xl font-semibold"></h3>
                <button onclick="hidePlayerModal()" class="text-4xl text-white/60 hover:text-white">×</button>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-10">
                <div class="bg-zinc-800 rounded-2xl p-5 text-center"><div class="text-xs text-emerald-300">AVG SCORE</div><div id="modal-avg" class="text-4xl font-semibold mt-1"></div></div>
                <div class="bg-zinc-800 rounded-2xl p-5 text-center"><div class="text-xs text-emerald-300">TOTAL $</div><div id="modal-winnings" class="text-4xl font-semibold text-emerald-400 mt-1"></div></div>
                <div class="bg-zinc-800 rounded-2xl p-5 text-center"><div class="text-xs text-emerald-300">ROUNDS</div><div id="modal-played" class="text-4xl font-semibold mt-1"></div></div>
            </div>
            <div class="text-emerald-200 text-sm mb-4 font-medium">SCORE HISTORY</div>
            <div id="modal-scores-list" class="max-h-80 overflow-auto rounded-2xl bg-zinc-800/50 divide-y divide-white/10"></div>
            <button onclick="hidePlayerModal()" class="mt-10 w-full py-4 text-emerald-400 font-medium">Close</button>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-x-3 z-[200]">
        <span id="toast-text" class="font-medium"></span>
    </div>

    <script>
        // Your Firebase Config (unchanged)
        const firebaseConfig = {
          apiKey: "AIzaSyAuwCy_4EdDmfM2ldEfgQlCH_VkYbYTzrQ",
          authDomain: "fvgc-2026-league.firebaseapp.com",
          projectId: "fvgc-2026-league",
          storageBucket: "fvgc-2026-league.firebasestorage.app",
          messagingSenderId: "384983086477",
          appId: "1:384983086477:web:9242eb680a7146264e79c4"
        };

        firebase.initializeApp(firebaseConfig);
        const tournamentsRef = firebase.database().ref('tournaments');

        const players = [
            { id: 1, name: "Dan Vander Loop" },
            { id: 2, name: "Alex Van Groll" },
            { id: 3, name: "Ryan Vanderaa" },
            { id: 4, name: "Nick Hermus" },
            { id: 5, name: "Connor DeBruin" },
            { id: 6, name: "Jake Hietpas" }
        ];

        let tournaments = [];

        function loadData() {
            tournamentsRef.on('value', (snapshot) => {
                tournaments = snapshot.val() ? Object.values(snapshot.val()) : [];
                tournaments.sort((a, b) => (b.id || 0) - (a.id || 0));
                renderStandings();
                renderHistory();
            });
        }

        function getPlayerStats(playerId) {
            const played = tournaments.filter(t => t.scores.some(s => s.playerId === playerId && s.score != null));
            let totalWinnings = 0, totalScore = 0, count = 0;
            let history = [];

            played.forEach(t => {
                const entry = t.scores.find(s => s.playerId === playerId);
                if (entry && entry.score != null) {
                    totalWinnings += entry.winnings || 0;
                    totalScore += entry.score;
                    count++;
                    history.push({name: t.name, score: entry.score, winnings: entry.winnings || 0});
                }
            });

            return {
                name: players.find(p => p.id === playerId).name,
                played: count,
                avg: count > 0 ? (totalScore / count).toFixed(1) : '—',
                winnings: totalWinnings,
                history
            };
        }

        function renderStandings() {
            const container = document.getElementById('standings-table');
            let html = `<table class="w-full"><thead><tr class="border-b border-white/10"><th class="py-6 px-6 text-left text-xs font-medium text-emerald-300">RANK</th><th class="py-6 px-6 text-left text-xs font-medium text-emerald-300">PLAYER</th><th class="py-6 px-6 text-center text-xs font-medium text-emerald-300">ROUNDS</th><th class="py-6 px-6 text-center text-xs font-medium text-emerald-300">AVG</th><th class="py-6 px-6 text-right text-xs font-medium text-emerald-300">TOTAL $</th></tr></thead><tbody class="divide-y divide-white/10">`;

            const stats = players.map(p => ({...getPlayerStats(p.id), id: p.id}));
            stats.sort((a, b) => b.winnings - a.winnings || parseFloat(a.avg) - parseFloat(b.avg) || 0);

            stats.forEach((stat, i) => {
                const rank = i + 1;
                const moneyClass = stat.winnings > 0 ? 'text-amber-400' : 'text-white/70';
                html += `
                    <tr onclick="showPlayerDetail(${stat.id})" class="cursor-pointer hover:bg-white/5 transition-colors">
                        <td class="py-6 px-6"><span class="rank-badge text-black font-bold text-xl w-9 h-9 inline-flex items-center justify-center rounded-2xl">${rank}</span></td>
                        <td class="py-6 px-6 font-medium">${stat.name}</td>
                        <td class="py-6 px-6 text-center font-mono text-lg">${stat.played}</td>
                        <td class="py-6 px-6 text-center font-semibold text-xl">${stat.avg}</td>
                        <td class="py-6 px-6 text-right font-semibold text-xl ${moneyClass}">$${stat.winnings}</td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function renderPlayerSelection() {
            const container = document.getElementById('player-selection');
            let html = '';
            players.forEach(p => {
                html += `
                <label class="flex items-center gap-4 bg-zinc-800 hover:bg-zinc-700 p-5 rounded-3xl cursor-pointer transition-colors">
                    <input type="checkbox" id="check-${p.id}" checked onchange="updateScoreInputs()" class="w-6 h-6 accent-emerald-500">
                    <span class="font-medium text-lg">${p.name}</span>
                </label>`;
            });
            container.innerHTML = html;
        }

        function updateScoreInputs() {
            const container = document.getElementById('score-inputs');
            let html = '';
            players.forEach(p => {
                if (document.getElementById(`check-${p.id}`).checked) {
                    html += `
                    <div class="bg-zinc-800 rounded-3xl p-6 flex items-center gap-6">
