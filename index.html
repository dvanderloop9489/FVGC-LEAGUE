<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#166534">
    <title>FVGC 2026 League Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .golf-green { background: linear-gradient(180deg, #166534 0%, #052e16 100%); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

    <!-- HEADER -->
    <div class="golf-green sticky top-0 z-50 shadow-lg">
        <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <span class="text-4xl">⛳</span>
                <div>
                    <h1 class="text-2xl font-semibold">FVGC 2026</h1>
                    <p class="text-emerald-200 text-sm">Fox Valley Golf Club • Kaukauna, WI</p>
                </div>
            </div>
            <div class="flex gap-x-2 text-sm">
                <button onclick="showTab(0)" id="tab-0" class="tab-button active bg-white text-emerald-800 px-5 py-2 rounded-3xl">🏆 Standings</button>
                <button onclick="showTab(1)" id="tab-1" class="tab-button px-5 py-2 rounded-3xl hover:bg-white/20">📝 Enter Scores</button>
                <button onclick="showTab(2)" id="tab-2" class="tab-button px-5 py-2 rounded-3xl hover:bg-white/20">📜 History</button>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4 pt-6">

        <!-- STANDINGS -->
        <div id="content-0" class="tab-content">
            <h2 class="text-3xl font-semibold mb-6">League Standings</h2>
            <div id="standings-table" class="bg-white/10 backdrop-blur-xl rounded-3xl overflow-hidden"></div>
        </div>

        <!-- ENTER SCORES -->
        <div id="content-1" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-6">Enter New Tournament</h2>
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6">
                <div class="space-y-6">
                    <div>
                        <label class="block text-emerald-200 text-sm mb-2">Tournament Name / Week</label>
                        <input id="tournament-name" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-lg" placeholder="Week 1 - April 11">
                    </div>

                    <div>
                        <label class="block text-emerald-200 text-sm mb-3">Select Players Who Played</label>
                        <div id="player-selection" class="space-y-3 bg-white/5 rounded-2xl p-5"></div>
                    </div>

                    <div>
                        <label class="block text-emerald-200 text-sm mb-3">Scores & Winnings</label>
                        <div id="score-inputs" class="space-y-4"></div>
                    </div>

                    <button onclick="saveNewTournament()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-5 rounded-3xl text-xl">💾 Save & Sync Tournament</button>
                </div>
            </div>
        </div>

        <!-- HISTORY -->
        <div id="content-2" class="tab-content hidden">
            <h2 class="text-3xl font-semibold mb-6">Tournament History</h2>
            <div id="history-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl z-50">
        <span id="toast-text"></span>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAuwCy_4EdDmfM2ldEfgQlCH_VkYbYTzrQ",
          authDomain: "fvgc-2026-league.firebaseapp.com",
          projectId: "fvgc-2026-league",
          storageBucket: "fvgc-2026-league.firebasestorage.app",
          messagingSenderId: "384983086477",
          appId: "1:384983086477:web:9242eb680a7146264e79c4"
        };

        firebase.initializeApp(firebaseConfig);
        const tournamentsRef = firebase.database().ref('tournaments');

        const players = [
            { id: 1, name: "Dan" },
            { id: 2, name: "Alex" },
            { id: 3, name: "Ryan" },
            { id: 4, name: "Nick" },
            { id: 5, name: "Connor" },
            { id: 6, name: "Jake" }
        ];

        let tournaments = [];

        function loadData() {
            tournamentsRef.on('value', (snapshot) => {
                tournaments = snapshot.val() ? Object.values(snapshot.val()) : [];
                tournaments.sort((a, b) => (b.id || 0) - (a.id || 0));
                renderStandings();
                renderHistory();
            });
        }

        function getPlayerStats(playerId) {
            const played = tournaments.filter(t => t.scores.some(s => s.playerId === playerId && s.score != null));
            let totalWinnings = 0, totalScore = 0, count = 0;
            let history = [];

            played.forEach(t => {
                const entry = t.scores.find(s => s.playerId === playerId);
                if (entry && entry.score != null) {
                    totalWinnings += entry.winnings || 0;
                    totalScore += entry.score;
                    count++;
                    history.push({name: t.name, score: entry.score, winnings: entry.winnings || 0});
                }
            });

            return {
                name: players.find(p => p.id === playerId).name,
                played: count,
                avg: count > 0 ? (totalScore / count).toFixed(1) : '—',
                winnings: totalWinnings,
                history
            };
        }

        function renderStandings() {
            const container = document.getElementById('standings-table');
            let html = `<table class="w-full"><thead><tr class="border-b border-white/10"><th class="py-5 px-6 text-left text-xs text-emerald-300">RANK</th><th class="py-5 px-6 text-left text-xs text-emerald-300">PLAYER</th><th class="py-5 px-6 text-center text-xs text-emerald-300">PLAYED</th><th class="py-5 px-6 text-center text-xs text-emerald-300">AVG</th><th class="py-5 px-6 text-right text-xs text-emerald-300">TOTAL $</th></tr></thead><tbody class="divide-y divide-white/10">`;

            const stats = players.map(p => ({...getPlayerStats(p.id), id: p.id}));
            stats.sort((a, b) => b.winnings - a.winnings || parseFloat(a.avg) - parseFloat(b.avg));

            stats.forEach((stat, i) => {
                const rank = i + 1;
                const moneyClass = stat.winnings > 0 ? 'text-emerald-400' : 'text-white/60';
                html += `<tr onclick="showPlayerDetail(${stat.id})" class="cursor-pointer hover:bg-white/5"><td class="py-5 px-6 text-2xl font-bold text-emerald-400">${rank}</td><td class="py-5 px-6 font-medium">${stat.name}</td><td class="py-5 px-6 text-center">${stat.played}</td><td class="py-5 px-6 text-center font-semibold">${stat.avg}</td><td class="py-5 px-6 text-right font-semibold ${moneyClass}">$${stat.winnings}</td></tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function renderPlayerSelection() {
            const container = document.getElementById('player-selection');
            let html = '';
            players.forEach(p => {
                html += `<label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" id="check-${p.id}" checked onchange="updateScoreInputs()" class="w-5 h-5 accent-emerald-500"> <span class="font-medium">${p.name}</span></label>`;
            });
            container.innerHTML = html;
        }

        function updateScoreInputs() {
            const container = document.getElementById('score-inputs');
            let html = '';
            players.forEach(p => {
                if (document.getElementById(`check-${p.id}`).checked) {
                    html += `<div class="bg-white/5 rounded-2xl p-4 flex gap-4 items-center"><div class="flex-1">${p.name}</div><input id="score-${p.id}" type="number" placeholder="Score" class="w-24 bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-center"><input id="winnings-${p.id}" type="number" value="0" class="w-24 bg-white/10 border border-white/20 rounded-2xl px-4 py-3 text-center"></div>`;
                }
            });
            container.innerHTML = html || '<p class="text-center py-8 text-white/50">Select at least one player</p>';
        }

        function saveNewTournament() {
            let name = document.getElementById('tournament-name').value.trim() || `Week ${tournaments.length + 1}`;

            const scores = [];
            players.forEach(p => {
                const checked = document.getElementById(`check-${p.id}`);
                if (checked && checked.checked) {
                    const score = parseFloat(document.getElementById(`score-${p.id}`).value) || null;
                    const winnings = parseFloat(document.getElementById(`winnings-${p.id}`).value) || 0;
                    scores.push({ playerId: p.id, score, winnings });
                }
            });

            if (scores.length === 0) return alert("Select at least one player");

            const newTournament = { id: Date.now(), name, scores };

            tournamentsRef.child(newTournament.id.toString()).set(newTournament)
                .then(() => {
                    showToast('✅ Saved & synced!');
                    document.getElementById('tournament-name').value = '';
                    renderPlayerSelection();
                    updateScoreInputs();
                    showTab(0);
                })
                .catch(err => alert('Save error: ' + err.message));
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (tournaments.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-emerald-300">No tournaments yet</div>`;
                return;
            }
            let html = '';
            tournaments.forEach(t => {
                const total = t.scores.reduce((sum, s) => sum + (s.winnings || 0), 0);
                html += `<div class="bg-white/10 rounded-3xl p-5"><div class="font-semibold">${t.name}</div><div class="text-emerald-400">$${total}</div></div>`;
            });
            container.innerHTML = html;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${n}`).classList.remove('hidden');
            document.querySelectorAll('.tab-button').forEach((b, i) => b.classList.toggle('active', i === n));
        }

        function initializeApp() {
            renderPlayerSelection();
            updateScoreInputs();
            loadData();
            showTab(0);
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
